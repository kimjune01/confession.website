<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>confession</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>confession</h1>
        <p class="subtitle">tell it once, then let it go.</p>

        <div id="view-record" class="view">
            <button id="record-btn" class="record-btn" aria-label="Record">
                <span id="record-icon" class="record-icon"></span>
            </button>
            <p id="record-time" class="record-time" hidden>0:00</p>
        </div>

        <div id="view-send" class="view" hidden>
            <button id="send-btn" class="send-btn">confess</button>
            <button id="redo-btn" class="redo-btn">record again</button>
        </div>

        <div id="view-sent" class="view" hidden>
            <p class="result-label">share this confession</p>
            <input type="text" id="link-out" readonly>
            <div class="link-actions">
                <button id="copy-btn" aria-label="Copy link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                </button>
                <button id="share-btn" class="share-btn" aria-label="Share link" hidden>
                    <svg width="18" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" y1="2" x2="12" y2="15"/>
                    </svg>
                </button>
            </div>
            <p class="warning">this link works once. after the listener hears it, it's gone.</p>
            <button id="another-btn" class="another-btn">confess again</button>
        </div>

        <footer>so i made this website &middot; <a href="https://ephemeral.website" target="_blank" rel="noopener">ephemeral</a></footer>
    </div>

    <script src="/script.js"></script>
</body>
</html>
