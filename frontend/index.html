<!DOCTYPE html>
<html lang="en" data-vapid-public-key="{{VAPID_PUBLIC_KEY}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>confession.website</title>
    <link rel="preload" href="/fonts/charter_italic.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/IBMPlexSans-Regular-Latin1.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="site-shell">
        <main id="app" class="app" aria-live="polite"></main>
    </div>

    <template id="tpl-frame">
        <section class="surface fade-in">
            <header class="brand-block">
                <h1 class="headline"></h1>
                <p class="rules"></p>
            </header>
            <div class="divider" aria-hidden="true"><span class="divider-end divider-end-left">➸</span><svg class="divider-line" viewBox="0 0 200 6" preserveAspectRatio="none"><ellipse cx="100" cy="3" rx="100" ry="3" fill="currentColor"/></svg><span class="divider-end">➸</span></div>
            <div class="surface-body"></div>
        </section>
    </template>

    <template id="tpl-compose">
        <section class="compose-card">
            <div class="compose-status" hidden></div>
            <div class="compose-tabs" hidden>
                <button type="button" class="tab-btn tab-active" data-tab="audio">record</button>
                <button type="button" class="tab-btn" data-tab="text">text</button>
            </div>
            <div class="tab-panel-audio">
                <div class="record-stack">
                    <div class="record-row">
                        <button class="record-btn" type="button" data-action="toggle-record" aria-label="Record">
                            <span class="record-icon"></span>
                        </button>
                    </div>
                    <p class="record-time">0:00</p>
                    <p class="record-caption"></p>
                </div>
                <div class="countdown-card" hidden>
                    <p class="countdown-phase"></p>
                    <p class="countdown-time"></p>
                </div>
                <div class="audio-preview" hidden>
                    <audio preload="metadata"></audio>
                    <button type="button" class="play-btn" data-action="toggle-play" aria-label="Play recording">
                        <span class="play-icon">▶</span>
                    </button>
                    <button type="button" class="ghost-btn" data-action="clear-audio">record again</button>
                </div>
                <div class="compose-actions" style="visibility:hidden">
                    <button type="button" class="send-btn" data-action="send"></button>
                </div>
            </div>
            <div class="tab-panel-text" hidden>
                <textarea class="compose-text" rows="2" maxlength="280"></textarea>
                <div class="compose-actions">
                    <button type="button" class="send-btn" data-action="send-text">send</button>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-listen-ready">
        <section class="notice-card">
            <button type="button" class="send-btn listen-btn" data-action="listen">listen just once</button>
            <button type="button" class="send-btn" data-action="show-text" hidden>show text</button>
        </section>
    </template>

    <template id="tpl-content">
        <section class="content-card">
            <div class="played-audio" hidden>
                <audio preload="metadata"></audio>
                <button type="button" class="play-btn" data-action="toggle-play" aria-label="Play message">
                    <span class="play-icon">▶</span>
                </button>
            </div>
            <p class="message-text" hidden></p>
        </section>
    </template>

    <template id="tpl-link-card">
        <section class="link-card">
            <input class="link-out" type="text" readonly>
            <div class="link-actions">
                <button type="button" class="send-btn compact" data-action="copy-link">copy</button>
                <button type="button" class="ghost-btn compact" data-action="share-link">share</button>
            </div>
            <p class="inline-note" style="visibility:hidden">you can check the link to see if it's been heard.</p>
            <div class="push-prompt" hidden>
                <p class="push-copy"></p>
                <div class="push-actions">
                    <button type="button" class="send-btn compact" data-action="push-yes">yes</button>
                    <button type="button" class="ghost-btn compact" data-action="push-no">no</button>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-rally-sent">
        <section class="notice-card">
            <p class="sent-tick">tick.</p>
            <p class="inline-note"></p>
            <div class="push-prompt" hidden>
                <p class="push-copy"></p>
                <div class="push-actions">
                    <button type="button" class="send-btn compact" data-action="push-yes">yes</button>
                    <button type="button" class="ghost-btn compact" data-action="push-no">no</button>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-empty">
        <section class="notice-card">
            <p class="inline-note"></p>
            <div class="compose-actions">
                <button type="button" class="ghost-btn" data-action="dismiss">dismiss</button>
            </div>
        </section>
    </template>

    <script type="module" src="/app.js"></script>
</body>
</html>
